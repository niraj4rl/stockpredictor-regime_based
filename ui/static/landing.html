<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stocker - Dotted Surface</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111827;
      --muted: #6b7280;
      --dot: #cbd5e1;
      --glow: rgba(37, 99, 235, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 48%, #f8fafc 0%, var(--bg) 58%);
      color: var(--fg);
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    #surface {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
    }

    .overlay-content {
      transform: translateY(-4vh);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 6vw, 5rem);
      letter-spacing: 0.08em;
      font-weight: 700;
      text-shadow: 0 0 35px var(--glow);
    }

    p {
      margin: 0.9rem 0 2rem;
      color: var(--muted);
      font-size: clamp(0.9rem, 1.3vw, 1.1rem);
      letter-spacing: 0.04em;
    }

    .cta {
      display: inline-block;
      text-decoration: none;
      color: #2563eb;
      border: 1px solid rgba(37, 99, 235, 0.35);
      border-radius: 999px;
      padding: 0.82rem 1.45rem;
      transition: 220ms ease;
      background: rgba(37, 99, 235, 0.08);
      backdrop-filter: blur(8px);
    }

    .cta:hover {
      transform: translateY(-1px);
      border-color: rgba(37, 99, 235, 0.6);
      background: rgba(37, 99, 235, 0.14);
    }
  </style>
</head>
<body>
  <div id="surface"></div>

  <div class="overlay">
    <div class="overlay-content">
      <h1>Stocker</h1>
      <p>we stalk stocks for you</p>
      <a class="cta" href="/app">Open Dashboard</a>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

    const container = document.getElementById('surface');
    if (!container) {
      throw new Error('surface container not found');
    }

    const SEPARATION = 120;
    const AMOUNT_X = 42;
    const AMOUNT_Y = 62;

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xf1f5f9, 1700, 9200);

    const camera = new THREE.PerspectiveCamera(
      58,
      window.innerWidth / window.innerHeight,
      1,
      10000,
    );
    camera.position.set(0, 350, 1200);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    const positions = [];
    const colors = [];

    for (let x = 0; x < AMOUNT_X; x++) {
      for (let y = 0; y < AMOUNT_Y; y++) {
        positions.push(
          x * SEPARATION - (AMOUNT_X * SEPARATION) / 2,
          0,
          y * SEPARATION - (AMOUNT_Y * SEPARATION) / 2,
        );
        colors.push(0.78, 0.82, 0.88);
      }
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 5,
      vertexColors: true,
      transparent: true,
      opacity: 0.78,
      sizeAttenuation: true,
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    let tick = 0;
    let rafId = 0;

    const animate = () => {
      rafId = requestAnimationFrame(animate);

      const attr = geometry.attributes.position;
      const pos = attr.array;
      let i = 0;

      for (let x = 0; x < AMOUNT_X; x++) {
        for (let y = 0; y < AMOUNT_Y; y++) {
          const idx = i * 3;
          pos[idx + 1] =
            Math.sin((x + tick) * 0.28) * 48 +
            Math.sin((y + tick) * 0.47) * 48;
          i++;
        }
      }

      attr.needsUpdate = true;
      renderer.render(scene, camera);
      tick += 0.095;
    };

    const onResize = () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    };

    window.addEventListener('resize', onResize);
    animate();

    window.addEventListener('beforeunload', () => {
      cancelAnimationFrame(rafId);
      window.removeEventListener('resize', onResize);
      geometry.dispose();
      material.dispose();
      renderer.dispose();
    });
  </script>
</body>
</html>
